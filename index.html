<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Pen</title>
	</head>
	<body>
         <button id="runPauseButton" class="fa-solid fa-pause" type="button"></button>
		<div class="responsive-container run" data-animation>
			<span></span>
			<div class="film top"></div>
			<div class="earth">
				<div class="counter run" data-animation data-counter></div>
			</div>
			<div class="jockey"></div>
			<div class="body">
				<div class="neck-pivot run" data-animation>
					<span></span>
					<div class="neck run" data-animation>
						<span></span>
						<div class="head-pivot">
							<span></span>
							<div class="head run" data-animation>
								<span></span>
								<div class="nose-pivot">
									<span></span>
								</div>
							</div>
						</div>
					</div>
				</div>

				<div class="tail-pivot run" data-animation>
					<div class="tail"><span></span></div>
				</div>
				<div class="hind outer run" data-animation>
					<span></span>
					<div class="upper-rear-leg run" data-animation>
						<span></span>
						<div class="lower-rear-leg run" data-animation>
							<span></span>
							<div class="rear-foot run" data-animation>
								<span></span>
								<div class="rear-hoof run" data-animation>
									<span></span>
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="hind inner run" data-animation>
					<span></span>
					<div class="upper-rear-leg run" data-animation>
						<span></span>
						<div class="lower-rear-leg run" data-animation>
							<span></span>
							<div class="rear-foot run" data-animation>
								<span></span>
								<div class="rear-hoof run" data-animation>
									<span></span>
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="shoulder outer run" data-animation>
					<span></span>
					<div class="upper-front-leg run" data-animation>
						<span></span>
						<div class="lower-front-leg run" data-animation>
							<span></span>
							<div class="front-foot run" data-animation>
								<span></span>
								<div class="front-hoof run" data-animation>
									<span></span>
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="shoulder inner run" data-animation>
					<span></span>
					<div class="upper-front-leg run" data-animation>
						<span></span>
						<div class="lower-front-leg run" data-animation>
							<span></span>
							<div class="front-foot run" data-animation>
								<span></span>
								<div class="front-hoof run" data-animation>
									<span></span>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
