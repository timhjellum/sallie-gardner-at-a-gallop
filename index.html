<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Pen</title>
	</head>
	<body>
         <button id="js-toggle" class="btn" type="button">JS: Toggle animations using `animationPlayState`</button>
		<div class="responsive-container" data-animation>
			<span></span>
			<div class="film top"></div>
			<div class="earth">
				<div class="counter"></div>
			</div>
			<div class="jockey"></div>
			<div class="body">
				<div class="neck-pivot" data-animation>
					<span></span>
					<div class="neck" data-animation>
						<span></span>
						<div class="head-pivot">
							<span></span>
							<div class="head" data-animation>
								<span></span>
								<div class="nose-pivot">
									<span></span>
								</div>
							</div>
						</div>
					</div>
				</div>

				<div class="tail-pivot" data-animation>
					<div class="tail"><span></span></div>
				</div>
				<div class="hind outer" data-animation>
					<span></span>
					<div class="upper-rear-leg outer" data-animation>
						<span></span>
						<div class="lower-rear-leg" data-animation>
							<span></span>
							<div class="rear-foot" data-animation>
								<span></span>
								<div class="rear-hoof" data-animation>
									<span></span>
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="hind inner" data-animation>
					<span></span>
					<div class="upper-rear-leg inner" data-animation>
						<span></span>
						<div class="lower-rear-leg" data-animation>
							<span></span>
							<div class="rear-foot" data-animation>
								<span></span>
								<div class="rear-hoof" data-animation>
									<span></span>
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="shoulder outer" data-animation>
					<span></span>
					<div class="upper-front-leg outer" data-animation>
						<span></span>
						<div class="lower-front-leg" data-animation>
							<span></span>
							<div class="front-foot" data-animation>
								<span></span>
								<div class="front-hoof" data-animation>
									<span></span>
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="shoulder inner" data-animation>
					<span></span>
					<div class="upper-front-leg inner" data-animation>
						<span></span>
						<div class="lower-front-leg" data-animation>
							<span></span>
							<div class="front-foot" data-animation>
								<span></span>
								<div class="front-hoof" data-animation>
									<span></span>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
